# GitHub Actions CI/CD Pipeline for Python Project
name: Python CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  DOCKER_IMAGE: 'registry.company.com/myapp'

jobs:
  # ============================================================
  # Stage 1: Lint -- Code Quality Check
  # ============================================================
  lint:
    name:  Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install flake8 black isort

      - name: Run flake8
        run: flake8 . --max-line-length=120 --statistics

      - name: Check formatting with black
        run: black --check .

      - name: Check imports with isort
        run: isort --check-only .

  # ============================================================
  # Stage 2: Test -- Run Unit Tests
  # ============================================================
  test:
    name:  Run Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ============================================================
  # Stage 3: Build -- Docker Image
  # ============================================================
  build:
    name:  Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ github.sha }} ${{ env.DOCKER_IMAGE }}:latest

      - name: Run container health check
        run: |
          docker run -d --name test-container -p 8000:8000 ${{ env.DOCKER_IMAGE }}:latest
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-container

  # ============================================================
  # Stage 4: Deploy -- Push to Registry & Deploy
  # ============================================================
  deploy:
    name:  Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo " Deploying version ${{ github.sha }} to production"
          echo "   Triggered by: ${{ github.actor }}"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Commit: ${{ github.event.head_commit.message }}"

      # In a real pipeline, you would:
      # - Push Docker image to container registry
      # - Apply Kubernetes manifests
      # - Run smoke tests
      # - Send Slack/Teams notification

      - name: Deploy complete
        run: echo " Deployment successful!"
